name: Run TypeScript Asserts

# Trigger workflow on any push and all pull requests
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      
      - name: Checkout repository
        uses: actions/checkout@v4

      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      
      - name: Install dependencies
        run: npm ci

      
      - name: TypeScript type check
        run: tsc --noEmit

      
      - name: Run assert-based tests
        run: npm test